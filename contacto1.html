<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css">
    <title>Willana-form</title>
</head>
<body>
  <div class="logo">
    <img src="img/logo-willana.png" alt="logotipo" width="100" height="50">
  </div>
    <section id="contact">
        <h2>Entre em Contato</h2>
        <p >Para mais informações sobre nossos serviços ou para agendar uma viagem, preencha o formulário abaixo:</p>

        <form action="https://formspree.io/f/xkgwnqdd" method="POST">
          <div class="form-group">
            <label for="name">Nome:</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="service">Local</label>
            <select id="service" name="service" required>
              <option value="" disabled selected>Selecione um local</option>
              <option value="Kruger-Park">Kruger Park SA</option>
              <option value="Parque Nacional-Maputo">Safari Parque Nacional</option>
              <option value="Namaacha Tour">Cascatas & Zoologico</option>
              <option value="Bilene">Praia do Bilene</option>
              <option value="Ponta D'Ouro">Ponta D'Ouro</option>
              <option value="Ponta Malongane">Ponta Malongane</option>
              <option value="Ponta Mamoli">Ponta Mamoli</option>
              <option value="Ponta Membene">Ponta Membene</option>
              <option value="Ilha do Inhaca">Ilha do Inhaca</option>
              <option value="SwaZlandia">Swazlandia</option>
              <option value="Inhambane-Vilanculos">Vilanculos</option>
              <option value="Inhambane-Tofo">Praia do Tofo</option>
              <option value="Inhambane-Barra">Praia da Barra</option>
              <option value="Parque Nacional-Gorongoza">Safari Gorongoza</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">Mensagem:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>
          <button type="submit">Enviar</button>
        </form>
      </section>
</body>
</html>
